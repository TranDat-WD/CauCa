<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="round2.css" />
    <title>Ao cá diệu kỳ</title>
  </head>
  <body>
    <img src="src/img/round2/Background.png" style="position: absolute" />
    <canvas id="sea" class="sea"></canvas>
    <div class="cau_hoi">
      <span class="text-overlay">Cho hình vẽ:</span>
      <img
        src="src/img/round2/HCN.png"
        alt="HCN"
        style="width: 40%; height: 90%; margin-left: 50px; margin-top: 15px"
      />
    </div>
    <div class="baitCount">
      <p id="pBaitCount" class="pBait">Số mồi câu: 9</p>
    </div>
    <div class="blackScreen" id="blackScreen">
      <div class="notification">
        <div class="scoreContainer">
          <p
            style="
              font-size: 5.5rem;
              color: #ffc74d;
              text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.3);
              letter-spacing: 2px;
            "
          >
            Điểm của bạn:
          </p>
          <p
            id="score"
            style="
              font-size: 5.5rem;
              color: #ffc74d;
              text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.3);
              letter-spacing: 2px;
            "
          >
            10d
          </p>
        </div>
        <button class="waiting">Chờ giáo viên...</button>
      </div>
    </div>
    <script src="round2.js"></script>
  </body>
</html>
